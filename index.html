.rpt-k{font-size:11px;color:var(--text2);flex-shrink:0;min-width:195px;display:flex;align-items:center;gap:6px}

.cmp-legend-item{display:flex;align-items:center;gap:5px}
.cmp-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.sp-cfg-title{font-size:11px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}

.sp-dot.ok{background:var(--green)}.sp-dot.error{background:var(--red)}.sp-dot.loading{background:var(--gold);animation:spin .8s linear infinite}

// ─── Schema versioning ──────────────────────────────────────────
// Increment SCHEMA_VERSION each time new fields are added.
// Add a migration function in MIGRATIONS keyed by target version.
var SCHEMA_VERSION = 1;
var MIGRATIONS = {
  // Example for future use:
  // 2: function(d){ d.answers.new_field = d.answers.new_field || ''; return d; }
};
function migrateAudit(d) {
  var v = d.schemaVersion || 0;
  while (v < SCHEMA_VERSION) {
    v++;
    if (MIGRATIONS[v]) d = MIGRATIONS[v](d);
  }
  d.schemaVersion = SCHEMA_VERSION;
  return d;
}

var SP_STORAGE_KEY = 'facilium_sp_config';
var _spSyncTimer = null;
function loadSpConfig(){try{return JSON.parse(localStorage.getItem(SP_STORAGE_KEY)||'null');}catch(e){return null;}}
function saveSpConfig(cfg){if(cfg&&cfg.siteUrl)localStorage.setItem(SP_STORAGE_KEY,JSON.stringify(cfg));else localStorage.removeItem(SP_STORAGE_KEY);}
function spServerRelPath(siteUrl,folder){var p=new URL(siteUrl).pathname.replace(/\/$/,'');return p+'/'+(folder||'Shared Documents/Site Audit').replace(/^\//,'');}
function spGetDigest(siteUrl){return fetch(siteUrl+'/_api/contextinfo',{method:'POST',headers:{'Accept':'application/json;odata=verbose'},credentials:'include'}).then(function(r){return r.json();}).then(function(j){return j.d.GetContextWebInformation.FormDigestValue;});}
function spReadAudits(siteUrl,folder){var rel=spServerRelPath(siteUrl,folder);return fetch(siteUrl+"/_api/web/GetFileByServerRelativePath(decodedurl='"+rel+"/audits.json')/$value",{credentials:'include'}).then(function(r){if(r.status===404)return '[]';if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(function(t){return JSON.parse(t);});}
function spWriteAudits(siteUrl,folder,audits){var rel=spServerRelPath(siteUrl,folder);return spGetDigest(siteUrl).then(function(digest){return fetch(siteUrl+"/_api/web/GetFolderByServerRelativeUrl('"+rel+"')/Files/add(url='audits.json',overwrite=true)",{method:'POST',headers:{'Accept':'application/json;odata=verbose','X-RequestDigest':digest},credentials:'include',body:JSON.stringify(audits)});}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);});}
function spEnsureFolder(siteUrl,folder){var rel=spServerRelPath(siteUrl,folder);return spGetDigest(siteUrl).then(function(digest){return fetch(siteUrl+'/_api/web/folders',{method:'POST',headers:{'Accept':'application/json;odata=verbose','Content-Type':'application/json;odata=verbose','X-RequestDigest':digest},credentials:'include',body:JSON.stringify({'__metadata':{'type':'SP.Folder'},'ServerRelativeUrl':rel})});}).catch(function(){});}
function scheduleSPSync(cfg){if(!cfg||!cfg.siteUrl)return;clearTimeout(_spSyncTimer);_spSyncTimer=setTimeout(function(){spWriteAudits(cfg.siteUrl,cfg.folder||'Shared Documents/Site Audit',loadAudits()).catch(function(){});},3000);}

var STORAGE_KEY = 'facilium_audits';
function loadAudits() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
function saveAuditToStorage(audit) {
  var all = loadAudits(); var idx = all.findIndex(function(a){return a.id===audit.id;});
  if (idx >= 0) all[idx] = audit; else all.push(audit);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}
function deleteAuditFromStorage(id) { localStorage.setItem(STORAGE_KEY, JSON.stringify(loadAudits().filter(function(a){return a.id!==id;}))); }
function exportAuditJson(audit) {
  var toExport = Object.assign({}, audit, { schemaVersion: SCHEMA_VERSION });
  var blob = new Blob([JSON.stringify(toExport, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url;
  a.download = 'audit-' + (audit.project.name || 'sans-nom').replace(/[^a-zA-Z0-9]/g, '_') + '-' + audit.id.slice(0, 8) + '.json';
  a.click(); URL.revokeObjectURL(url);
}
function importAuditJson(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() {
      try {
        var d = JSON.parse(reader.result);
        if (!d.id || !d.project || !d.answers) throw new Error('Format invalide');
        resolve(migrateAudit(d));
      } catch(e) { reject(e); }
    };
    reader.onerror = reject; reader.readAsText(file);
  });
}

// Quality scoring: options ordered best→worst, score = position / total (1.0 = best, 0.0 = worst)
var QUALITY_MAP = {
  dpe_classe:{opts:['A','B','C','D','E','F','G'],worst:['Non réalisé']},

  detente_exterieur:{best:['Oui — terrasse / patio','Oui — jardin / parc','Oui — rooftop','Oui — cour intérieure'],bad:['Non']},
  tension_emploi:{opts:['Très détendu (surplus)','Détendu','Équilibré','Tendu','Très tendu (pénurie)']},

function qualityScore(ans){
  var total=0,count=0;
  Object.keys(QUALITY_MAP).forEach(function(k){
    var v=ans[k]; if(!isAnswered(v)||typeof v!=='string')return;
    var m=QUALITY_MAP[k];
    if(m.opts){
      var idx=m.opts.indexOf(v);
      if(idx<0)return;
      total+=(m.opts.length-1-idx)/(m.opts.length-1);count++;
    } else {
      if(m.best&&m.best.indexOf(v)>=0){total+=1;count++;}
      else if(m.neutral&&m.neutral.indexOf(v)>=0){total+=0.5;count++;}
      else if(m.bad&&m.bad.indexOf(v)>=0){total+=0;count++;}
      else if(m.worst&&m.worst.indexOf(v)>=0){total+=0;count++;}
    }
  });
  // Signal quality scores
  ['signal_orange','signal_sfr','signal_bouyguestelecom','signal_freemobile',
   'signal_eebt','signal_vodafone','signal_three','signal_o2virginmedia',
   'signal_deutschetelekom','signal_1und1','signal_o2telefnica',
   'signal_movistar','signal_msmvilyoigo',
   'signal_tim','signal_windtre','signal_iliad',
   'signal_meo','signal_nos','signal_nowo',
   'signal_kpn','signal_tmobile','signal_tele2',
   'signal_proximus','signal_basetelenet','signal_mobilevikings',
   'signal_swisscom','signal_sunrise','signal_salt','signal_upc',
   'signal_post','signal_tango',
   'signal_eir','signal_48formerlytesco',
   'signal_a1','signal_magentatmobile','signal_drei',
   'signal_plus','signal_play'
  ].forEach(function(k){
    var v=ans[k];if(!isAnswered(v))return;
    var sigOpts=['Excellent','Bon','Moyen','Faible','Aucun signal','Non testé'];
    var idx=sigOpts.indexOf(v);if(idx<0||v==='Non testé')return;
    total+=(4-idx)/4;count++;
  });
  return count?total/count:null;
}

function scoreGlobal(ans){
  var starKeys=['visibilite','etat_general','expansion_possible','score_global','cw_score'];
  var starVals=starKeys.map(function(k){return ans[k];}).filter(function(v){return typeof v==='number';});
  var starPct=starVals.length?starVals.reduce(function(a,b){return a+b;},0)/(starVals.length*5):null;
  var allKeys=Object.values(SECTION_KEYS).reduce(function(a,b){return a.concat(b);},[]);
  var filled=allKeys.filter(function(k){return isAnswered(ans[k]);}).length;
  var completionPct=allKeys.length?filled/allKeys.length:0;
  var qScore=qualityScore(ans);
  // Weighted: quality 50%, stars 25% (if present), completion 25%
  if(starPct!==null&&qScore!==null) return Math.round((qScore*0.50+starPct*0.25+completionPct*0.25)*100);
  if(qScore!==null) return Math.round((qScore*0.60+completionPct*0.40)*100);
  if(starPct!==null) return Math.round((starPct*0.60+completionPct*0.40)*100);
  return Math.round(completionPct*100);
}
function computeAlerts(ans){
  var a=[];
  if(ans.cablage_existant==='Non')a.push('Câblage réseau absent.');
  if(typeof ans.categorie_cable==='string'&&ans.categorie_cable.indexOf('Cat 5e')===0)a.push('Câblage Cat 5e obsolète.');

}

function Field(props){
  var label=tl(props.label),value=props.value,onChange=props.onChange,type=props.type||'text',opts=props.opts,hint=props.hint,isNew=props.isNew,placeholder=props.placeholder;

      ${opts.map(function(o){return html`<option key=${o} value=${o}>${o}</option>`;})}

  } else if(type==='textarea'){
    input=html`<textarea value=${value!=null?value:''} onInput=${function(e){onChange(e.target.value);}} placeholder=${placeholder}></textarea>`;

    input=html`<input type=${type} value=${value!=null?value:''} onInput=${function(e){onChange(e.target.value);}} placeholder=${placeholder} />`;
  }
  return html`<div class="fld">

function Stars(props){
  var label=tl(props.label),value=props.value,onChange=props.onChange,isNew=props.isNew;
  var hs=useState(0),hover=hs[0],setHover=hs[1];
  var v=value||0;
  return html`<div class="fld">
    <label>${label}${isNew?html`<span class="new-bdg">Nouveau</span>`:null}</label>
    <div class="stars" onMouseLeave=${function(){setHover(0);}}>
      ${[1,2,3,4,5].map(function(i){return html`<span key=${i} class=${'star'+((hover||v)>=i?' on':'')} onMouseEnter=${function(){setHover(i);}} onClick=${function(){onChange(i);}}>★</span>`;})}
      ${v>0?html`<span class="star-val">${v} / 5</span>`:null}
    </div>
  </div>`;
}

function MultiSelect(props){
  var label=tl(props.label),value=props.value,onChange=props.onChange,opts=props.opts,hint=props.hint,isNew=props.isNew;
  function toggle(o){
    if(value.indexOf(o)>=0)return onChange(value.filter(function(x){return x!==o;}));
    if(isNone(o))return onChange([o]);
    onChange(value.filter(function(x){return !isNone(x);}).concat([o]));
  }
  return html`<div class="fld">
    <label>${label}${isNew?html`<span class="new-bdg">Nouveau</span>`:null}</label>
    <div class="ms-grid">
      ${opts.map(function(o){var sel=value.indexOf(o)>=0;return html`<span key=${o} class=${'ms-chip'+(sel?' sel':'')} onClick=${function(){toggle(o);}}>
        ${sel?html`<i class="ti ti-check"></i>`:null}${o}
      </span>`;})}
    </div>
    ${hint?html`<span class="hint">${hint}</span>`:null}
  </div>`;
}

function geocodeAddress(address){
  return fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(address),{headers:{'Accept-Language':'fr'}})
    .then(function(r){return r.json();})
    .then(function(data){if(!data.length)throw new Error('Address not found');return{lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon),display:data[0].display_name};});
}

function queryOverpass(lat,lng){
  var queries=Object.keys(POI_CONFIG).map(function(k){
    var c=POI_CONFIG[k];
    return c.query+'(around:'+c.radius+','+lat+','+lng+');';
  });
  var q='[out:json][timeout:25];('+queries.join('')+');out center 200;';
  return fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}})
    .then(function(r){return r.json();})
    .then(function(data){
      var results={};
      Object.keys(POI_CONFIG).forEach(function(k){results[k]=[];});
      (data.elements||[]).forEach(function(el){
        var elLat=el.lat||(el.center&&el.center.lat);
        var elLng=el.lon||(el.center&&el.center.lon);
        if(!elLat||!elLng)return;
        var t=el.tags||{};
        var cat=null;
        if(t.highway==='bus_stop')cat='bus_stop';
        else if(t.station==='subway')cat='subway';
        else if(t.railway==='tram_stop')cat='tram_stop';
        else if(t.railway==='station'&&t.station!=='subway')cat='train_station';
        else if(t.aeroway==='aerodrome')cat='airport';
        else if(t.amenity==='parking')cat='parking';
        if(cat)results[cat].push({lat:elLat,lng:elLng,name:t.name||t.description||''});
      });
      return results;
    });
}

  var er=useState(null),error=er[0],setError=er[1];
  var mapRef={current:null};
  var mapId='cmp-map-'+audits.map(function(a){return a.id.slice(0,4);}).join('-');

  useEffect(function(){
    var addresses=audits.map(function(a){return a.answers.adresse;}).filter(Boolean);
    if(addresses.length<2){setStatus('error');setError('Il faut au moins 2 adresses renseignées pour afficher la carte.');return;}

    var mapEl=document.getElementById(mapId);
    if(!mapEl)return;
    if(mapRef.current){mapRef.current.remove();mapRef.current=null;}

    var map=L.map(mapId,{zoomControl:true});
    mapRef.current=map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);

    var allCoords=[];
    var pending=audits.length;

    audits.forEach(function(audit,idx){
      var addr=audit.answers.adresse;
      if(!addr){pending--;if(!pending)finalize();return;}

      geocodeAddress(addr).then(function(geo){
        allCoords.push([geo.lat,geo.lng]);
        L.marker([geo.lat,geo.lng],{icon:createSiteIcon(SITE_COLORS[idx]||'#378ADD'),zIndexOffset:1000}).addTo(map)
          .bindPopup('<b style="font-size:13px">'+(audit.project.name||'Site '+(idx+1))+'</b><br><span style="font-size:11px;color:#666">'+geo.display+'</span>');

        return queryOverpass(geo.lat,geo.lng);
      }).then(function(pois){
        if(!pois)return;
        Object.keys(pois).forEach(function(cat){
          var conf=POI_CONFIG[cat];
          var items=pois[cat];
          items.slice(0,conf.max).forEach(function(poi){
            L.marker([poi.lat,poi.lng],{icon:createPoiIcon(cat),zIndexOffset:cat==='airport'?500:100}).addTo(map)
              .bindPopup('<div style="font-size:12px;min-width:120px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:8px;height:8px;border-radius:50%;background:'+conf.color+'"></div><b>'+conf.label+'</b></div>'+(poi.name?'<div style="color:#666">'+poi.name+'</div>':'')+'</div>');
          });
        });
      }).catch(function(e){
        console.warn('Geocode/Overpass error for',addr,e);
      }).finally(function(){
        pending--;
        if(!pending)finalize();
      });
    });

    function finalize(){
      setStatus('ready');
      setTimeout(function(){
        map.invalidateSize();
        if(allCoords.length>=2){
          map.fitBounds(allCoords,{padding:[50,50],maxZoom:13});
        } else if(allCoords.length===1){
          map.setView(allCoords[0],13);
        }
      },100);
    }

    return function(){if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[]);

  if(error)return html`<div class="cmp-map-error"><i class="ti ti-alert-triangle"></i> ${error}</div>`;

  return html`<div class="cmp-map-wrap">
    ${status==='loading'?html`<div class="cmp-map-loading"><i class="ti ti-loader" style="animation:spin 1s linear infinite;margin-right:8px"></i> Chargement de la carte…</div>`:null}
    <div id=${mapId} class="cmp-map" style=${'display:'+(status==='ready'?'block':'none')}></div>
    ${status==='ready'?html`<div class="cmp-legend">
      ${audits.map(function(a,i){return html`<div key=${a.id} class="cmp-legend-item"><div class="cmp-legend-dot" style=${'background:'+(SITE_COLORS[i]||'#378ADD')}></div><b>${a.project.name||t('no_name')}</b></div>`;})}
      <span style="color:var(--border2)">|</span>
      ${Object.keys(POI_CONFIG).map(function(k){var c=POI_CONFIG[k];return html`<div key=${k} class="cmp-legend-item"><div class="cmp-legend-dot" style=${'background:'+c.color+';display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:'+(k==='parking'?'3px':'50%')} dangerouslySetInnerHTML=${{__html:'<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'+POI_ICONS[k]+'</svg>'}}></div>${c.label}</div>`;})}
    </div>`:null}
  </div>`;
}

function CompareView(p){

    if(!filled.length)return;
    rows.push({type:'header',sec:sec});
    filled.forEach(function(q){rows.push({type:'data',q:q});});
  });
  return html`<div class="cmp-wrap">
    <div class="print-hide" style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="btn" onClick=${onBack}><i class="ti ti-arrow-left"></i> ${t('back')}</button>

      <button class="btn btn-primary" onClick=${function(){window.print();}}><i class="ti ti-printer"></i> ${t('print_pdf')}</button>
    </div>
    <div class="print-only" style="display:none;margin-bottom:16px">
      <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:4px">${t('comparison_of')} ${audits.length} ${t('audits_word')}</div>
      <div style="font-size:18px;font-weight:700">${audits.map(function(a){return a.project.name||t('no_name');}).join(' vs ')}</div>
      <div style="font-size:11px;color:#888;margin-top:4px">${new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}</div>
    </div>
    <div class="rpt-kpi-row" style="margin-bottom:20px">
      ${audits.map(function(a){return html`<div key=${a.id} class="rpt-kpi"><div class="rpt-kpi-v" style=${'color:'+(a.score>=70?'#1D9E75':a.score>=45?'#BA7517':'#E24B4A')+';font-size:22px'}>${a.score}%</div><div class="rpt-kpi-l">${a.project.name||t('no_name')}</div></div>`;})}
    </div>
    <${CompareMap} audits=${audits} />
    <table class="cmp-table"><thead><tr><th>${t('criterion')}</th>${audits.map(function(a){return html`<th key=${a.id}>${a.project.name||t('no_name')}</th>`;})}</tr></thead>
    <tbody>${rows.map(function(r,i){
      if(r.type==='header') return html`<tr key=${'h'+i} class="cmp-sec-row"><td colSpan=${audits.length+1} style=${'color:'+r.sec.color}><i class=${'ti '+r.sec.icon}></i> ${tSec(r.sec.id)}</td></tr>`;
      return html`<tr key=${'d'+i}><td>${r.q.label}</td>${audits.map(function(a){return html`<td key=${a.id}>${fmtAns(a.answers[r.q.key],r.q.label.indexOf('/5')>=0)}</td>`;})}</tr>`;
    })}</tbody></table>
    <div style="margin-top:20px;font-size:9px;color:var(--text3);text-align:center;opacity:.6">© Antoine Bouvier 2016</div>
  </div>`;
}

          <div style="display:flex;align-items:center;gap:8px;margin-right:8px">
            <span style="font-size:11px;color:var(--text3)">${t('pdf_lang')} :</span>
            <${LangPicker} lang=${reportLang} setLang=${setRptLang} small=${true} />
          </div>
          <button class="btn" onClick=${handleSave}><i class="ti ti-download"></i>${t('save_export')}</button>
          <button class="btn btn-primary" onClick=${handlePrint}><i class="ti ti-printer"></i>${t('print_pdf')}</button>
        </div>
      </div>`}
    </div>
  </div>`;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
